name: Daily Market Insights & Anomaly Detector

on:
  schedule:
    # Run daily at 18:00 UTC (11:00 AM MST / America/Phoenix timezone)
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Allow manual execution from Actions tab

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run daily insights analysis
      run: python daily_insights.py

    - name: Commit and push reports and charts
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add insights/ README.md
        if git diff --cached --quiet; then
          echo "No new reports or charts generated today."
        else
          git commit -m "chore: auto-generate daily market anomaly report [skip ci]"
          git push
        fi
